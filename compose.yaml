services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: house-prices-api
    ports:
      - "8000:8000"
    volumes:
      - ./outputs:/app/outputs
      - ./datasets:/app/datasets
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      mlflow:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.10.1
    container_name: house-prices-mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./outputs/mlruns:/mlruns
    command: mlflow ui --host 0.0.0.0 --port 5000 --backend-store-uri file:///mlruns
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
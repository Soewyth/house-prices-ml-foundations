services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: house-prices-api
    ports:
      - "8000:8000"
    volumes:
      - ./outputs:/app/outputs
      - ./datasets:/app/datasets
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - mlflow
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.10.1
    container_name: house-prices-mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./outputs/mlruns:/mlruns
    command: mlflow ui --host 0.0.0.0 --port 5000 --backend-store-uri file:///mlruns
    restart: unless-stopped